name: Android Release 1.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Verify, build, test and lint
        run: |
          python3 scripts/verify_project.py
          gradle --stacktrace --console=plain assembleDebug
          gradle --stacktrace --console=plain testDebugUnitTest
          gradle --stacktrace --console=plain lintDebug

      - name: Prepare release file
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/PromptDatasetBuilder-1.1.0-debug.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PromptDatasetBuilder-1.1.0-debug.apk
          generate_release_notes: true
