name: Android CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Lint, tests and debug APK
        run: gradle --stacktrace lintDebug testDebugUnitTest assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: prompt-dataset-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
