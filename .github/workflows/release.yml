name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Detect signing configuration
        id: signing
        env:
          SIGNING_KEY_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing key
        if: ${{ steps.signing.outputs.available == 'true' }}
        env:
          SIGNING_KEY_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build APK and AAB
        run: gradle --stacktrace testDebugUnitTest assembleRelease bundleRelease assembleDebug

      - name: Collect artifacts
        run: |
          mkdir -p release-files
          cp app/build/outputs/apk/debug/*.apk release-files/
          if [ "${{ steps.signing.outputs.available }}" = "true" ]; then
            cp app/build/outputs/apk/release/*.apk release-files/
            cp app/build/outputs/bundle/release/*.aab release-files/
          else
            echo "Signing secrets are absent; publishing the debug APK only."
          fi
          sha256sum release-files/* > release-files/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: prompt-dataset-release
          path: release-files/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
          generate_release_notes: true
