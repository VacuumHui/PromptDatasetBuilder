name: Android CI 1.1.0

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Install Android SDK 36
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Preserve debug signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: prompt-dataset-debug-${{ github.repository_id }}

      - name: Verify project sources
        run: python3 scripts/verify_project.py

      - name: Build debug APK
        run: gradle --stacktrace --console=plain assembleDebug

      - name: Run parser unit tests
        run: gradle --stacktrace --console=plain testDebugUnitTest

      - name: Run Android lint
        run: gradle --stacktrace --console=plain lintDebug

      - name: Prepare APK
        if: success()
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/PromptDatasetBuilder-1.1.0-debug.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: PromptDatasetBuilder-1.1.0-debug
          path: dist/PromptDatasetBuilder-1.1.0-debug.apk
          if-no-files-found: error

      - name: Upload diagnostic reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: PromptDatasetBuilder-1.1.0-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.txt
          if-no-files-found: ignore
